<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hola Wilson y Heidy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Light theme (default) */
    :root,
    [data-theme="light"] {
      --bg-color: #FF6600;
      --text-color: #FFFFFF;
      --btn-bg: rgba(255, 255, 255, 0.2);
      --btn-hover-bg: rgba(255, 255, 255, 0.35);
      --btn-border: rgba(255, 255, 255, 0.6);
    }

    /* Dark theme */
    [data-theme="dark"] {
      --bg-color: #1a1a2e;
      --text-color: #e0e0e0;
      --btn-bg: rgba(255, 255, 255, 0.1);
      --btn-hover-bg: rgba(255, 255, 255, 0.2);
      --btn-border: rgba(255, 255, 255, 0.3);
    }

    body {
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    h1 {
      color: var(--text-color);
      font-size: 3rem;
      text-align: center;
      text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.3);
      transition: color 0.4s ease;
    }

    /* Theme toggle button */
    #theme-toggle {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      background: var(--btn-bg);
      border: 2px solid var(--btn-border);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      cursor: pointer;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease, transform 0.3s ease;
      backdrop-filter: blur(4px);
    }

    #theme-toggle:hover {
      background: var(--btn-hover-bg);
      transform: scale(1.1) rotate(15deg);
    }

    #theme-toggle:focus {
      outline: 2px solid var(--text-color);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <button id="theme-toggle" aria-label="Cambiar tema" title="Cambiar tema claro/oscuro">
    🌙
  </button>
  <h1>¡Hola Wilson y Heidy!</h1>

  <script>
    const btn = document.getElementById('theme-toggle');
    const html = document.documentElement;

    // Load saved preference
    const savedTheme = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', savedTheme);
    btn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

    btn.addEventListener('click', () => {
      const current = html.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', next);
      btn.textContent = next === 'dark' ? '☀️' : '🌙';
      localStorage.setItem('theme', next);
    });
  </script>
</body>
</html>
