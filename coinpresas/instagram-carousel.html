<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COINPRE S.A.S — Carrusel Instagram</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    h1.page-title {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 10px;
      text-align: center;
      opacity: 0.7;
    }

    .brand-label {
      color: #ff5001;
      font-size: 1.5rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 36px;
      letter-spacing: 1px;
    }

    /* ─── Carousel Wrapper ─── */
    .carousel-wrapper {
      position: relative;
      width: 480px;
      max-width: 100%;
    }

    .carousel-track {
      display: flex;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      width: calc(480px * 4);
    }

    /* ─── Each Slide = 1080×1080 ratio (1:1) ─── */
    .slide {
      width: 480px;
      max-width: 100vw;
      aspect-ratio: 1 / 1;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
    }

    /* ─── Navigation Buttons ─── */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,80,1,0.92);
      border: none;
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      transition: background 0.2s, transform 0.2s;
    }
    .nav-btn:hover { background: #d94400; transform: translateY(-50%) scale(1.1); }
    .nav-btn.prev { left: -22px; }
    .nav-btn.next { right: -22px; }

    /* ─── Dots ─── */
    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
      border: none;
    }
    .dot.active { background: #ff5001; transform: scale(1.25); }

    .slide-counter {
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      text-align: center;
      margin-top: 10px;
      letter-spacing: 2px;
    }

    /* ══════════════════════════════════════════
       SLIDE 1 — PORTADA / BRAND
    ══════════════════════════════════════════ */
    .slide-1 {
      background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 60%, #0d0d1a 100%);
    }

    /* Diagonal orange accent */
    .slide-1::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 55%;
      height: 100%;
      background: linear-gradient(160deg, #ff5001 0%, #ff7c3a 100%);
      clip-path: polygon(30% 0, 100% 0, 100% 100%, 0% 100%);
      opacity: 0.95;
      z-index: 0;
    }

    .slide-1-content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 44px;
    }

    .s1-tag {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      padding: 6px 14px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.25);
    }

    .s1-company {
      font-size: 1.55rem;
      font-weight: 900;
      color: #fff;
      text-transform: uppercase;
      line-height: 1.1;
      margin-bottom: 6px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .s1-company span {
      color: #ffd0b8;
    }

    .s1-full-name {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.65);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .s1-slogan {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 36px;
      line-height: 1.4;
      max-width: 240px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .s1-slogan em {
      color: #ffb899;
      font-style: normal;
    }

    .s1-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .s1-badge::before {
      content: '✓';
      background: #ff5001;
      color: #fff;
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      flex-shrink: 0;
    }

    .s1-right-content {
      position: absolute;
      right: 0; top: 0;
      width: 55%;
      height: 100%;
      clip-path: polygon(30% 0, 100% 0, 100% 100%, 0% 100%);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      padding: 40px 30px 40px 60px;
      z-index: 2;
    }

    .s1-icon-shield {
      font-size: 5rem;
      margin-bottom: 16px;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.3));
    }

    .s1-stat {
      text-align: center;
    }

    .s1-stat-num {
      font-size: 2.5rem;
      font-weight: 900;
      color: #fff;
      line-height: 1;
    }

    .s1-stat-label {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.8);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 4px;
    }

    .s1-instagram {
      position: absolute;
      bottom: 20px;
      left: 44px;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.5);
      font-weight: 600;
      letter-spacing: 1.5px;
      z-index: 3;
    }

    /* ══════════════════════════════════════════
       SLIDE 2 — SERVICIOS
    ══════════════════════════════════════════ */
    .slide-2 {
      background: #f7f7f7;
    }

    .s2-header {
      background: linear-gradient(135deg, #0d0d1a, #1a1a2e);
      padding: 30px 36px 24px;
    }

    .s2-label {
      font-size: 0.6rem;
      color: #ff5001;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 6px;
    }

    .s2-title {
      font-size: 1.4rem;
      font-weight: 900;
      color: #fff;
      text-transform: uppercase;
      line-height: 1.1;
    }

    .s2-title span { color: #ff5001; }

    .s2-services {
      padding: 20px 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      flex: 1;
    }

    .s2-service-card {
      background: #fff;
      border-radius: 10px;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      border-left: 3px solid #ff5001;
      transition: transform 0.2s;
    }

    .s2-service-icon {
      font-size: 1.5rem;
    }

    .s2-service-title {
      font-size: 0.62rem;
      font-weight: 800;
      color: #0d0d1a;
      text-transform: uppercase;
      line-height: 1.3;
      letter-spacing: 0.5px;
    }

    .s2-service-desc {
      font-size: 0.55rem;
      color: #777;
      line-height: 1.4;
    }

    .s2-footer {
      background: #ff5001;
      padding: 10px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .s2-footer-text {
      font-size: 0.62rem;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .s2-footer-ig {
      font-size: 0.55rem;
      color: rgba(255,255,255,0.8);
      font-weight: 600;
    }

    /* ══════════════════════════════════════════
       SLIDE 3 — ¿POR QUÉ ELEGIRNOS?
    ══════════════════════════════════════════ */
    .slide-3 {
      background: linear-gradient(160deg, #ff5001 0%, #d94400 100%);
    }

    .slide-3-content {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 36px 36px;
      position: relative;
      overflow: hidden;
    }

    /* Decorative circles */
    .slide-3::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      z-index: 0;
    }

    .slide-3::after {
      content: '';
      position: absolute;
      bottom: -60px; left: -60px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: rgba(0,0,0,0.08);
      z-index: 0;
    }

    .s3-label {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.7);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .s3-title {
      font-size: 1.6rem;
      font-weight: 900;
      color: #fff;
      text-transform: uppercase;
      line-height: 1.1;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .s3-features {
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .s3-feature {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(4px);
      border-radius: 10px;
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .s3-feature-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .s3-feature-text h3 {
      font-size: 0.7rem;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }

    .s3-feature-text p {
      font-size: 0.58rem;
      color: rgba(255,255,255,0.85);
      line-height: 1.45;
    }

    .s3-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
      position: relative;
      z-index: 1;
    }

    .s3-cert-badge {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .s3-ig {
      font-size: 0.58rem;
      color: rgba(255,255,255,0.7);
      font-weight: 600;
    }

    /* ══════════════════════════════════════════
       SLIDE 4 — CONTACTO / CTA
    ══════════════════════════════════════════ */
    .slide-4 {
      background: #0d0d1a;
    }

    .slide-4-content {
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .s4-top {
      background: linear-gradient(135deg, #ff5001, #d94400);
      padding: 36px 36px 28px;
      position: relative;
    }

    /* Triangle cut */
    .s4-top::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0;
      width: 100%;
      height: 40px;
      background: #0d0d1a;
      clip-path: polygon(0 100%, 100% 0, 100% 100%);
    }

    .s4-label {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.8);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    .s4-headline {
      font-size: 1.5rem;
      font-weight: 900;
      color: #fff;
      text-transform: uppercase;
      line-height: 1.1;
    }

    .s4-subheadline {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.85);
      margin-top: 8px;
      font-weight: 500;
      line-height: 1.5;
      max-width: 280px;
    }

    .s4-body {
      padding: 32px 36px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .s4-contact-items {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }

    .s4-contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .s4-icon-wrap {
      width: 42px; height: 42px;
      border-radius: 10px;
      background: rgba(255,80,1,0.15);
      border: 1px solid rgba(255,80,1,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .s4-contact-label {
      font-size: 0.55rem;
      color: rgba(255,255,255,0.5);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 2px;
    }

    .s4-contact-value {
      font-size: 0.75rem;
      color: #fff;
      font-weight: 700;
    }

    .s4-cta-btn {
      background: linear-gradient(135deg, #ff5001, #d94400);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 6px 24px rgba(255,80,1,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      width: 100%;
    }

    .s4-cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255,80,1,0.5);
    }

    .s4-footer {
      padding: 14px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .s4-socials {
      display: flex;
      gap: 12px;
    }

    .s4-social {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      text-decoration: none;
    }

    .s4-ig-handle {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.5);
      font-weight: 600;
    }

    /* ─── Hint ─── */
    .swipe-hint {
      color: rgba(255,255,255,0.35);
      font-size: 0.7rem;
      text-align: center;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    /* ─── Download Button ─── */
    .download-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #ff5001, #d94400);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 11px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(255,80,1,0.45);
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      margin-top: 16px;
    }
    .download-btn:hover {
      background: linear-gradient(135deg, #d94400, #b53800);
      transform: translateY(-2px);
      box-shadow: 0 8px 26px rgba(255,80,1,0.55);
    }
    .download-btn:active {
      transform: translateY(0);
    }
    .download-btn:disabled {
      opacity: 0.6;
      cursor: wait;
      transform: none;
    }
    .download-btn svg {
      flex-shrink: 0;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"><\/script>
</head>
<body>

  <p class="page-title">Carrusel para Instagram</p>
  <p class="brand-label">COINPRE S.A.S</p>

  <div class="carousel-wrapper">
    <!-- PREV button -->
    <button class="nav-btn prev" onclick="changeSlide(-1)" aria-label="Anterior">&#8249;</button>

    <div style="overflow: hidden; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);">
      <div class="carousel-track" id="track">

        <!-- ══════ SLIDE 1: PORTADA ══════ -->
        <div class="slide slide-1">
          <div class="slide-1-content">
            <span class="s1-tag">🛡️ Seguridad &amp; Salud Laboral</span>
            <div class="s1-company">COINPRE<br/><span>S.A.S</span></div>
            <div class="s1-full-name">Consultoría Integral<br/>en Prevención S.A.S</div>
            <div class="s1-slogan">
              Tu seguridad<br/>
              <em>¡Nuestro Compromiso!</em>
            </div>
            <div class="s1-badge">Certificados CELAC · NTC 6072</div>
          </div>

          <!-- Right orange panel content -->
          <div class="s1-right-content">
            <div class="s1-icon-shield">🦺</div>
            <div class="s1-stat">
              <div class="s1-stat-num">+10</div>
              <div class="s1-stat-label">Años de<br/>experiencia</div>
            </div>
          </div>

          <div class="s1-instagram">@coinpre_s.a.s</div>
        </div>

        <!-- ══════ SLIDE 2: SERVICIOS ══════ -->
        <div class="slide slide-2" style="display:flex;flex-direction:column;">
          <div class="s2-header">
            <div class="s2-label">Nuestros servicios</div>
            <div class="s2-title">Lo que<br/><span>hacemos</span></div>
          </div>

          <div class="s2-services">
            <div class="s2-service-card">
              <div class="s2-service-icon">🏗️</div>
              <div class="s2-service-title">Trabajo Seguro en Alturas</div>
              <div class="s2-service-desc">Capacitación y entrenamiento TSA para todo tipo de operaciones.</div>
            </div>
            <div class="s2-service-card">
              <div class="s2-service-icon">🕳️</div>
              <div class="s2-service-title">Espacios Confinados</div>
              <div class="s2-service-desc">Formación especializada para entradas seguras en espacios confinados.</div>
            </div>
            <div class="s2-service-card">
              <div class="s2-service-icon">📋</div>
              <div class="s2-service-title">Asesoría SST</div>
              <div class="s2-service-desc">Consultoría en salud, seguridad, calidad y medio ambiente.</div>
            </div>
            <div class="s2-service-card">
              <div class="s2-service-icon">👷</div>
              <div class="s2-service-title">Suministro de Personal</div>
              <div class="s2-service-desc">Acompañamiento en actividades críticas con personal calificado.</div>
            </div>
          </div>

          <div class="s2-footer">
            <div class="s2-footer-text">¡Cotiza tu servicio hoy!</div>
            <div class="s2-footer-ig">@coinpre_s.a.s</div>
          </div>
        </div>

        <!-- ══════ SLIDE 3: ¿POR QUÉ ELEGIRNOS? ══════ -->
        <div class="slide slide-3">
          <div class="slide-3-content">
            <div class="s3-label">¿Por qué elegirnos?</div>
            <div class="s3-title">Tu mejor<br/>aliado en<br/>seguridad</div>

            <div class="s3-features">
              <div class="s3-feature">
                <div class="s3-feature-icon">🎓</div>
                <div class="s3-feature-text">
                  <h3>Certificados &amp; Autorizados</h3>
                  <p>Certificados por CELAC bajo la norma NTC 6072 y autorizados por el Ministerio del Trabajo.</p>
                </div>
              </div>
              <div class="s3-feature">
                <div class="s3-feature-icon">🏆</div>
                <div class="s3-feature-text">
                  <h3>Líderes Nacionales</h3>
                  <p>Reconocidos a nivel nacional en formación para trabajo seguro en alturas y espacios confinados.</p>
                </div>
              </div>
              <div class="s3-feature">
                <div class="s3-feature-icon">🔄</div>
                <div class="s3-feature-text">
                  <h3>Solución Integral</h3>
                  <p>Capacitación, asesoría, equipos y suministro de personal: todo en un solo lugar.</p>
                </div>
              </div>
            </div>

            <div class="s3-bottom">
              <div class="s3-cert-badge">✓ Min. Trabajo Autorizado</div>
              <div class="s3-ig">@coinpre_s.a.s</div>
            </div>
          </div>
        </div>

        <!-- ══════ SLIDE 4: CONTACTO / CTA ══════ -->
        <div class="slide slide-4">
          <div class="slide-4-content">
            <div class="s4-top">
              <div class="s4-label">¡Contáctanos ya!</div>
              <div class="s4-headline">Protege a<br/>tu equipo</div>
              <div class="s4-subheadline">Habla con uno de nuestros asesores y recibe una propuesta personalizada sin costo.</div>
            </div>

            <div class="s4-body">
              <div class="s4-contact-items">
                <div class="s4-contact-item">
                  <div class="s4-icon-wrap">📱</div>
                  <div>
                    <div class="s4-contact-label">WhatsApp / Asesor Comercial</div>
                    <div class="s4-contact-value">310 791 8133</div>
                  </div>
                </div>
                <div class="s4-contact-item">
                  <div class="s4-icon-wrap">📧</div>
                  <div>
                    <div class="s4-contact-label">Correo electrónico</div>
                    <div class="s4-contact-value">comercial@coinpresas.co</div>
                  </div>
                </div>
                <div class="s4-contact-item">
                  <div class="s4-icon-wrap">📍</div>
                  <div>
                    <div class="s4-contact-label">Ubicación · Bogotá</div>
                    <div class="s4-contact-value">Fontibón, La Giralda</div>
                  </div>
                </div>
              </div>

              <a href="https://api.whatsapp.com/send/?phone=573107918133" class="s4-cta-btn" target="_blank">
                💬 Consultanos Hoy
              </a>
            </div>

            <div class="s4-footer">
              <div class="s4-socials">
                <a class="s4-social" href="https://www.instagram.com/coinpre_s.a.s/" target="_blank">📸</a>
                <a class="s4-social" href="https://www.facebook.com/COINPRE" target="_blank">👍</a>
                <a class="s4-social" href="https://www.linkedin.com/company/coinpre-sas/" target="_blank">💼</a>

        </div>

      </div><!-- /track -->
    </div><!-- /overflow -->

    <!-- NEXT button -->
    <button class="nav-btn next" onclick="changeSlide(1)" aria-label="Siguiente">&#8250;</button>
  </div>

  <!-- Dots -->
  <div class="dots" id="dots">
    <button class="dot active" onclick="goToSlide(0)"></button>
    <button class="dot" onclick="goToSlide(1)"></button>
    <button class="dot" onclick="goToSlide(2)"></button>
    <button class="dot" onclick="goToSlide(3)"></button>
  </div>

  <div class="slide-counter" id="counter">1 / 4</div>
  <p class="swipe-hint">← → para navegar entre posts</p>
  <!-- Download button -->
  <button class="download-btn" id="download-btn" onclick="downloadCurrentSlide()" aria-label="Descargar imagen actual">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Descargar imagen
  </button>


  <script>
    let current = 0;
    const total = 4;
    const track = document.getElementById('track');
    const dotsEl = document.querySelectorAll('.dot');
    const counterEl = document.getElementById('counter');

    function updateCarousel() {
      const slideWidth = track.parentElement.clientWidth;
      track.style.transform = `translateX(-${current * slideWidth}px)`;
      dotsEl.forEach((d, i) => d.classList.toggle('active', i === current));
      counterEl.textContent = `${current + 1} / ${total}`;
    }

    function changeSlide(dir) {
      current = (current + dir + total) % total;
      updateCarousel();
    }

    function goToSlide(idx) {
      current = idx;
      updateCarousel();
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') changeSlide(1);
      if (e.key === 'ArrowLeft') changeSlide(-1);
    });

    // Touch / swipe support
    let touchStartX = 0;
    const wrapper = track.parentElement;
    wrapper.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
    wrapper.addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) changeSlide(diff > 0 ? 1 : -1);
    });

    // Init
    window.addEventListener('resize', updateCarousel);
    updateCarousel();

    // Download current slide as image
    async function downloadCurrentSlide() {
      const btn = document.getElementById('download-btn');
      btn.disabled = true;
      btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Generando...';

      try {
        const slides = document.querySelectorAll('.slide');
        const slideEl = slides[current];

        const canvas = await html2canvas(slideEl, {
          scale: 2,
          useCORS: true,
          allowTaint: true,
          backgroundColor: null,
          width: slideEl.offsetWidth,
          height: slideEl.offsetHeight,
          logging: false
        });

        const link = document.createElement('a');
        link.download = `coinpre-instagram-post-${current + 1}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (err) {
        console.error('Error al descargar:', err);
        alert('No se pudo generar la imagen. Intenta nuevamente.');
      }

      btn.disabled = false;
      btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Descargar imagen';
    }
  </script>
</body>
